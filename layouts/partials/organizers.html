<h2 class="section-title">
    <div class="centered-content">
        Organizers
    </div>
</h2>
<!-- <div class="centered-content"> -->


    <div class="people centered-content">
        {{ range $k, $v := (where .Site.RegularPages "Section" "people")}}
        
        <div class="person">
            <a href="{{.Params.Website}}">
            <img src="{{.Params.Picture}}" alt="{{.Params.Name}}"/>
            </a>
            <div class="main">
                {{.Params.Name}}
            </div>
            <div class="details">
                {{.Params.Role}}<br/>
                {{.Params.Affiliation}}
            </div>
        </div>
        {{ end }}

        <!-- <a href="#">
            more >>
        </link> -->
    </div>
